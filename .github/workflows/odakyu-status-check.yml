name: odakyu-status-check

on:
  schedule:
    # cron は UTC。日本時間 8:30 = UTC 前日 23:30。
    # 平日(月〜金)の朝に対応させるため、UTC では日〜木(0-4)の 23:30 を指定。
    - cron: "30 23 * * 0-4"
  workflow_dispatch: {}  # 手動実行用（テスト）

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Run checker
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python check_odakyu.py
